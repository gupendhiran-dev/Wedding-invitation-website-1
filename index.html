<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gupendhiran & Narmatha — Forever Begins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <svg class="film-grain" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#noiseFilter)"/>
  </svg>

  <div id="loader">
    <div class="loader-content">
      <div class="loader-petals">
        <div class="loader-petal" style="--i:0"></div>
        <div class="loader-petal" style="--i:1"></div>
        <div class="loader-petal" style="--i:2"></div>
        <div class="loader-petal" style="--i:3"></div>
        <div class="loader-petal" style="--i:4"></div>
        <div class="loader-petal" style="--i:5"></div>
        <div class="loader-petal" style="--i:6"></div>
        <div class="loader-petal" style="--i:7"></div>
      </div>
      <p class="loader-text">A love story begins…</p>
    </div>
  </div>

  <button id="music-toggle" class="magnetic" aria-label="Toggle music">
    <svg class="music-icon play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="5 3 19 12 5 21 5 3"/>
    </svg>
    <svg class="music-icon pause-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="6" y1="4" x2="6" y2="20"/><line x1="18" y1="4" x2="18" y2="20"/>
    </svg>
    <span class="music-label">Music</span>
  </button>
  <audio id="bg-music" loop>
    </audio>

  <section id="hero" class="section">
    <canvas id="three-canvas"></canvas>

    <div class="parallax-layer layer-sky" data-speed="0.1">
      <div class="sky-gradient"></div>
      <div class="stars-container" id="stars"></div>
    </div>

    <div class="parallax-layer layer-clouds" data-speed="0.25">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
      <div class="cloud cloud-4"></div>
    </div>

    <div class="parallax-layer layer-mountains" data-speed="0.4">
      <svg class="mountains-svg" viewBox="0 0 1440 400" preserveAspectRatio="none">
        <path d="M0,400 L0,250 Q120,120 240,200 Q360,280 480,160 Q600,40 720,120 Q840,200 960,80 Q1080,0 1200,100 Q1320,200 1440,140 L1440,400 Z" fill="#c9a7b2" opacity="0.5"/>
        <path d="M0,400 L0,300 Q180,180 360,240 Q540,300 720,200 Q900,100 1080,180 Q1260,260 1440,220 L1440,400 Z" fill="#d4b8c1" opacity="0.6"/>
      </svg>
    </div>

    <div class="parallax-layer layer-foliage" data-speed="0.6">
      <div class="foliage-left"></div>
      <div class="foliage-right"></div>
    </div>

    <div class="petals-container" id="petals"></div>

    <div class="butterflies-container" id="butterflies">
      <div class="butterfly b1"><div class="wing left"></div><div class="wing right"></div></div>
      <div class="butterfly b2"><div class="wing left"></div><div class="wing right"></div></div>
      <div class="butterfly b3"><div class="wing left"></div><div class="wing right"></div></div>
    </div>

    <div class="birds-container" id="birds">
      <svg class="bird bird-1" viewBox="0 0 60 20" fill="none"><path d="M30,10 Q20,2 5,8 Q20,6 30,10 Q40,6 55,8 Q40,2 30,10Z" fill="rgba(120,60,80,0.6)"/></svg>
      <svg class="bird bird-2" viewBox="0 0 60 20" fill="none"><path d="M30,10 Q20,2 5,8 Q20,6 30,10 Q40,6 55,8 Q40,2 30,10Z" fill="rgba(120,60,80,0.5)"/></svg>
      <svg class="bird bird-3" viewBox="0 0 60 20" fill="none"><path d="M30,10 Q20,2 5,8 Q20,6 30,10 Q40,6 55,8 Q40,2 30,10Z" fill="rgba(120,60,80,0.4)"/></svg>
    </div>

    <div class="hero-content">
      <div class="hero-tagline">Together Forever</div>
      <div class="hero-names">
        <span class="name-bride">Gupendhiran</span>
        <span class="name-and">&</span>
        <span class="name-groom">Narmatha</span>
      </div>
      <div class="hero-divider">
        <span class="divider-line"></span>
        <svg class="divider-flower" viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="4" fill="#c9748a"/>
          <ellipse cx="20" cy="10" rx="4" ry="7" fill="#e8a0b0" transform="rotate(0,20,20)"/>
          <ellipse cx="20" cy="10" rx="4" ry="7" fill="#e8a0b0" transform="rotate(45,20,20)"/>
          <ellipse cx="20" cy="10" rx="4" ry="7" fill="#e8a0b0" transform="rotate(90,20,20)"/>
          <ellipse cx="20" cy="10" rx="4" ry="7" fill="#e8a0b0" transform="rotate(135,20,20)"/>
          <ellipse cx="20" cy="10" rx="4" ry="7" fill="#e8a0b0" transform="rotate(180,20,20)"/>
          <ellipse cx="20" cy="10" rx="4" ry="7" fill="#e8a0b0" transform="rotate(225,20,20)"/>
          <ellipse cx="20" cy="10" rx="4" ry="7" fill="#e8a0b0" transform="rotate(270,20,20)"/>
          <ellipse cx="20" cy="10" rx="4" ry="7" fill="#e8a0b0" transform="rotate(315,20,20)"/>
        </svg>
        <span class="divider-line"></span>
      </div>
      <div class="hero-date">
        <span>Saturday, the 14th of February</span>
        <span class="hero-year">2026</span>
      </div>
      <div class="hero-location">Grand Leela Palace, Chennai</div>
    </div>
  </section>

  <section id="couple" class="section">
    </section>

  <section id="rsvp" class="section">
    <div class="rsvp-bg"><div class="rsvp-petals-container" id="rsvpPetals"></div></div>
    <div class="container">
      <div class="section-header reveal-up">
        <p class="eyebrow">You're Invited</p>
        <h2 class="section-title">RSVP</h2>
      </div>
      <div class="rsvp-form-wrap reveal-up">
        <form id="rsvpForm" class="rsvp-form" onsubmit="handleRSVP(event)">
          <button type="submit" class="rsvp-submit-btn magnetic" id="rsvpBtn">
            <span class="btn-text">Send Your Love 💌</span>
            <span class="btn-sparkle"></span>
          </button>
        </form>
        <div class="rsvp-success hidden" id="rsvpSuccess">
          <div class="success-hearts">💕</div>
          <h3>Thank You!</h3>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="animations.js"></script>
  <script src="scroll-effects.js"></script>
</body>
</html>
